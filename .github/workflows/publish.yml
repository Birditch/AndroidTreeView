name: Publish

# 发布工作流 (Release publishing).
#
# 仅在推送形如 "v*" 的 tag 时运行（例如 v1.0.0）。普通提交、PR、对分支的 push 都不会触发本工作流。
# 注意：截至当前尚未推送任何 tag（No tag has been pushed yet）。首个正式发布请在准备就绪后执行：
#     git tag v1.0.0 && git push origin v1.0.0
# 届时本工作流会自动构建 win-x64 / win-x86 自包含发布、打包 MSI、生成校验和并创建 GitHub Release。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 创建 Release 并上传资产需要写权限。

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  CONFIGURATION: Release
  SOLUTION: AndroidTreeView.sln
  APP_PROJECT: src/AndroidTreeView.App/AndroidTreeView.App.csproj

jobs:
  publish:
    name: Publish Windows MSIs
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 从 tag 名派生版本号：v1.0.0 -> 1.0.0。
      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing tag '$tag' as version '$version'."

      - name: Restore
        run: dotnet restore $env:SOLUTION

      - name: Build
        run: dotnet build $env:SOLUTION -c $env:CONFIGURATION --no-restore

      # 发布前再跑一次测试，确保发布产物来自通过测试的提交。
      - name: Test
        run: >-
          dotnet test $env:SOLUTION
          -c $env:CONFIGURATION
          --no-build
          --logger trx
          --results-directory test-results

      - name: Publish win-x64 (self-contained)
        run: >-
          dotnet publish $env:APP_PROJECT
          -c $env:CONFIGURATION
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          -o publish/win-x64

      - name: Publish win-x86 (self-contained)
        run: >-
          dotnet publish $env:APP_PROJECT
          -c $env:CONFIGURATION
          -r win-x86
          --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          -o publish/win-x86

      # MSI 打包由 packaging/ 下的 WiX 脚本完成（由 MSI 打包 agent 创建）。
      # 约定的脚本接口 (contract): packaging/build-msi.ps1
      #   -Arch       x64 | x86
      #   -Version    语义版本号，例如 1.0.0
      #   -PublishDir 对应架构的 dotnet publish 输出目录
      #   -OutputDir  存放生成的 .msi 的目录
      - name: Build MSI (x64)
        shell: pwsh
        run: >-
          ./packaging/build-msi.ps1
          -Arch x64
          -Version ${{ steps.version.outputs.version }}
          -PublishDir publish/win-x64
          -OutputDir artifacts

      - name: Build MSI (x86)
        shell: pwsh
        run: >-
          ./packaging/build-msi.ps1
          -Arch x86
          -Version ${{ steps.version.outputs.version }}
          -PublishDir publish/win-x86
          -OutputDir artifacts

      # 为每个 MSI 生成独立的 .sha256 文件，并汇总一份 SHA256SUMS.txt。
      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactsDir = 'artifacts'
          $msis = Get-ChildItem -Path $artifactsDir -Filter *.msi -ErrorAction Stop
          if (-not $msis) {
            throw "No .msi files were produced in '$artifactsDir'. Check the MSI build steps."
          }
          $summary = New-Object System.Collections.Generic.List[string]
          foreach ($msi in $msis) {
            $hash = (Get-FileHash -Path $msi.FullName -Algorithm SHA256).Hash.ToLower()
            $line = "$hash  $($msi.Name)"
            Set-Content -Path "$($msi.FullName).sha256" -Value $line -Encoding ascii
            $summary.Add($line)
            Write-Host $line
          }
          Set-Content -Path (Join-Path $artifactsDir 'SHA256SUMS.txt') -Value $summary -Encoding ascii

      # 生成发布说明正文（安装说明 + 校验和），softprops 会再追加自动生成的提交记录。
      # 用 PowerShell 字符串数组逐行构建，避免 here-string 内容顶格破坏 YAML 块标量缩进。
      - name: Compose release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.version.outputs.version }}'
          $checksums = (Get-Content -Path 'artifacts/SHA256SUMS.txt' -Raw).TrimEnd()
          $lines = @(
            "## AndroidTreeView $version"
            ''
            '跨平台 Android 设备信息查看器（基于 Avalonia / .NET 10）。本次发布提供 Windows 安装包 (MSI)。'
            ''
            '### 安装 (Installation)'
            ''
            "- 64 位系统 (x64)：下载并运行 AndroidTreeView-$version-x64.msi"
            "- 32 位系统 (x86)：下载并运行 AndroidTreeView-$version-x86.msi"
            ''
            '安装包为自包含 (self-contained) 构建，无需单独安装 .NET 运行时。使用前请确保已安装 Android platform-tools (adb) 并加入 PATH，或在应用内手动指定 adb 路径。'
            ''
            '### 校验和 (SHA-256)'
            ''
            '```'
            $checksums
            '```'
          )
          Set-Content -Path 'RELEASE_NOTES.md' -Value $lines -Encoding utf8
          Write-Host (Get-Content -Path 'RELEASE_NOTES.md' -Raw)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AndroidTreeView ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/*.msi
            artifacts/*.msi.sha256
            artifacts/SHA256SUMS.txt
