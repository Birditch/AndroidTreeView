name: Publish

# Release publishing is intentionally GitHub Actions only.
# Maintainers create a v* tag or run workflow_dispatch; local machines may build
# test packages, but they are not the release authority.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.5"
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  CONFIGURATION: Release
  SOLUTION: AndroidTreeView.sln

jobs:
  resolve:
    name: Resolve release version
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'.Trim().TrimStart('v')
            $tag = "v$version"
          } else {
            $tag = '${{ github.ref_name }}'
            $version = $tag.Trim().TrimStart('v')
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version '$version' must be major.minor.patch."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing $tag as version $version."

  validate:
    name: Validate on Windows
    runs-on: windows-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore $env:SOLUTION

      - name: Build
        run: dotnet build $env:SOLUTION -c $env:CONFIGURATION --no-restore

      - name: Test
        run: >-
          dotnet test $env:SOLUTION
          -c $env:CONFIGURATION
          --no-build
          --logger trx
          --results-directory test-results

      - name: Verify scrcpy release pin
        shell: pwsh
        run: ./tools/verify-scrcpy-latest.ps1

  package:
    name: Package ${{ matrix.product }} ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    needs:
      - resolve
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: App
            rid: win-x64
            os: windows-latest
            artifact: android-tree-view-app-win-x64
          - product: App
            rid: osx-arm64
            os: macos-latest
            artifact: android-tree-view-app-osx-arm64
          - product: Mini
            rid: win-x64
            os: windows-latest
            artifact: android-tree-view-mini-win-x64
          - product: Mini
            rid: osx-arm64
            os: macos-latest
            artifact: android-tree-view-mini-osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build ZIP
        shell: pwsh
        run: >-
          ./packaging/build-update-zip.ps1
          -Product ${{ matrix.product }}
          -Rid ${{ matrix.rid }}
          -Configuration $env:CONFIGURATION
          -Version ${{ needs.resolve.outputs.version }}

      - name: Verify macOS app bundle ZIP
        if: matrix.rid == 'osx-arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Path artifacts -Filter '*.zip' | Select-Object -First 1
          if ($null -eq $zip) {
            throw 'No ZIP artifact was produced.'
          }

          $product = '${{ matrix.product }}'
          $appName = if ($product -eq 'Mini') { 'AndroidTreeView Mini.app' } else { 'AndroidTreeView.app' }
          $executable = if ($product -eq 'Mini') { 'AndroidTreeView.App.mini' } else { 'AndroidTreeView.App' }
          $entries = & unzip -Z1 $zip.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect '$($zip.FullName)' with unzip."
          }

          $requiredEntries = @(
            "$appName/Contents/Info.plist",
            "$appName/Contents/MacOS/$executable",
            "$appName/Contents/MacOS/release.json",
            "$appName/Contents/MacOS/scrcpy/scrcpy",
            "$appName/Contents/MacOS/scrcpy/adb"
          )

          foreach ($entry in $requiredEntries) {
            if ($entries -notcontains $entry) {
              throw "macOS ZIP '$($zip.Name)' is missing required entry '$entry'."
            }
          }

          $looseRootEntries = @('release.json', $executable) | Where-Object { $entries -contains $_ }
          if ($looseRootEntries) {
            throw "macOS ZIP '$($zip.Name)' contains loose root entries instead of only an .app bundle: $($looseRootEntries -join ', ')."
          }

          Write-Host "Verified macOS ZIP contains $appName."

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            artifacts/*.zip
            artifacts/*.zip.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs:
      - resolve
      - package
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksum summary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactsDir = 'artifacts'
          $sidecars = Get-ChildItem -Path $artifactsDir -Filter '*.zip.sha256' -ErrorAction Stop | Sort-Object Name
          if ($sidecars.Count -ne 4) {
            throw "Expected 4 .zip.sha256 files in '$artifactsDir', found $($sidecars.Count)."
          }

          $lines = foreach ($sidecar in $sidecars) {
            (Get-Content -LiteralPath $sidecar.FullName -Raw).Trim()
          }

          Set-Content -Path (Join-Path $artifactsDir 'SHA256SUMS.txt') -Value $lines -Encoding ascii
          $lines | ForEach-Object { Write-Host $_ }

      - name: Compose release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ needs.resolve.outputs.version }}'
          $checksums = (Get-Content -Path 'artifacts/SHA256SUMS.txt' -Raw).TrimEnd()
          $lines = @(
            "## AndroidTreeView $version"
            ''
            'Release packages are GitHub Actions-built ZIP packages for Windows x64 and macOS Apple Silicon. macOS ZIPs contain top-level .app bundles.'
            ''
            '### Artifacts'
            ''
            "- AndroidTreeView-$version-win-x64.zip"
            "- AndroidTreeView-$version-osx-arm64.zip"
            "- AndroidTreeView-Mini-$version-win-x64.zip"
            "- AndroidTreeView-Mini-$version-osx-arm64.zip"
            ''
            '### SHA-256'
            ''
            '```'
            $checksums
            '```'
          )
          Set-Content -Path 'RELEASE_NOTES.md' -Value $lines -Encoding utf8
          Get-Content -Path 'RELEASE_NOTES.md' -Raw

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: AndroidTreeView ${{ needs.resolve.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/*.zip
            artifacts/*.zip.sha256
            artifacts/SHA256SUMS.txt
